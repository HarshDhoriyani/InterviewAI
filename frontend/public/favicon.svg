<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">

  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#b8891e"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="8" fill="#111009"/>

  <!-- Performance bars (rising left to right) -->
  <rect x="4"  y="20" width="4" height="8"  rx="1.5" fill="url(#goldGrad)" opacity="0.45"/>
  <rect x="10" y="15" width="4" height="13" rx="1.5" fill="url(#goldGrad)" opacity="0.65"/>
  <rect x="16" y="9"  width="4" height="19" rx="1.5" fill="url(#goldGrad)" opacity="0.85"/>
  <rect x="22" y="13" width="4" height="15" rx="1.5" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- Accent dot at the peak -->
  <circle cx="18" cy="7" r="2.2" fill="#e8c97a"/>
</svg>
